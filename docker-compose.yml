services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: openclaw-backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./scopes:/app/scopes
      - ./nuclei-custom:/app/nuclei-custom  # drop your own templates here
      - ./openclaw:/app/openclaw  # live reload in dev; remove in prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - openclaw-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: openclaw-frontend
    env_file: .env
    environment:
      - BACKEND_BASE_URL=http://host.docker.internal:8000
    ports:
      - "8501:8501"
    volumes:
      - ./openclaw:/app/openclaw
      - ./scopes:/app/scopes
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
